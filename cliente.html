<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebo & Livraria | Acervo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a202c; scroll-behavior: smooth; }
        .bg-navy { background-color: #001a35; }
        .text-accent { color: #ffcc00; }
        .bg-accent { background-color: #ffcc00; }
        .hero-gradient { background: linear-gradient(90deg, #f8f9fa 0%, #e9ecef 100%); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-navy py-2 px-6 md:px-12 flex justify-end gap-6 text-[11px] font-bold text-white uppercase tracking-wider border-b border-white/10">
        <div id="user-status" class="flex gap-6"><button onclick="abrirLogin()" class="hover:text-accent">ENTRAR / REGISTRAR</button></div>
        <div id="user-logged-nav" class="hidden flex gap-6 border-l border-white/20 pl-6 items-center">
            <span id="label-user" class="text-accent italic lowercase"></span>
            <button onclick="voltarLoja()" class="hover:text-accent uppercase">Loja</button>
            <button onclick="verMeusPedidos()" class="hover:text-accent font-black text-accent uppercase">Minhas Compras</button>
            <button onclick="abrirVenderObra()" class="hover:text-accent uppercase">Vender Obra</button>
            <button onclick="sair()" class="text-red-400">SAIR</button>
        </div>
    </div>

    <header class="bg-navy py-5 px-6 md:px-12 flex flex-col lg:flex-row items-center gap-8 shadow-xl text-white">
        <div class="flex items-center gap-3 min-w-fit cursor-pointer" onclick="voltarLoja()">
            <div class="bg-accent p-2 rounded-sm text-navy text-2xl font-black">S&L</div>
            <div class="leading-none text-white">
                <h1 class="text-xl font-light italic">Sebo &</h1>
                <h2 class="text-accent text-2xl font-extrabold uppercase tracking-tighter">Livraria</h2>
            </div>
        </div>
        <div class="flex-grow max-w-3xl flex shadow-2xl">
            <input type="text" id="busca" placeholder="Pesquisar por título..." class="w-full py-3 px-5 rounded-l-sm outline-none text-sm text-slate-700">
            <button class="bg-accent px-8 rounded-r-sm hover:bg-yellow-400 font-black text-navy text-xs uppercase">Buscar</button>
        </div>
        <div onclick="abrirModalCarrinho()" class="bg-white/10 p-2 rounded-sm flex items-center gap-4 cursor-pointer min-w-fit border border-white/5">
            <div class="bg-accent text-navy p-2 rounded-sm font-bold text-lg">🛒</div>
            <div class="text-white pr-2">
                <span class="block text-[10px] font-bold text-accent uppercase" id="count">0 Itens</span>
                <span class="block font-bold text-md" id="total-val">R$ 0,00</span>
            </div>
        </div>
    </header>

    <section id="banner-hero" class="hero-gradient py-12 px-6 md:px-12 border-b border-slate-100">
        <div class="max-w-7xl mx-auto w-full flex flex-col md:flex-row items-center justify-between">
            <div class="md:w-1/2 space-y-4">
                <h3 class="text-4xl md:text-5xl font-extrabold text-slate-800 leading-tight italic text-center md:text-left">Não há amigo mais leal <br> que um <span class="text-navy">livro.</span></h3>
                <p class="text-slate-500 font-medium text-center md:text-left">Curadoria profissional de obras raras e novos títulos.</p>
                <div class="flex justify-center md:justify-start">
                    <button onclick="window.scrollTo({top: 500, behavior: 'smooth'})" class="bg-navy text-white px-8 py-3 font-bold hover:bg-blue-900 rounded-sm text-xs uppercase">Explorar Catálogo</button>
                </div>
            </div>
            <div class="md:w-1/3 mt-8 md:mt-0">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=600" class="rounded-sm shadow-2xl">
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <section id="loja-container"><div id="vitrine" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div></section>
        <section id="area-pedidos" class="hidden"><h4 class="text-2xl font-extrabold text-navy uppercase italic mb-8 border-b-4 border-accent w-fit">Minhas Compras</h4><div id="lista-meus-pedidos" class="grid gap-4"></div></section>
        <section id="area-venda" class="hidden max-w-xl mx-auto bg-slate-50 p-8 rounded-sm border-t-4 border-accent shadow-lg"><h4 class="text-2xl font-black mb-2 text-navy uppercase italic text-center">Venda sua Obra</h4>
            <form id="formProposta" class="space-y-4">
                <input type="text" id="propTitulo" placeholder="Título do Livro" class="w-full border p-3 rounded-sm outline-none" required>
                <input type="number" step="0.01" id="propPreco" placeholder="Preço Sugerido R$" class="border p-3 rounded-sm w-full" required>
                <button type="submit" class="w-full bg-navy text-white py-4 font-black uppercase">Enviar para Curadoria</button>
            </form>
        </section>
    </main>

    <div id="modal-checkout" class="fixed inset-0 bg-navy/90 hidden flex items-center justify-center p-4 z-[2000] backdrop-blur-sm">
        <div id="container-endereco" class="bg-white p-8 max-w-lg w-full rounded-sm shadow-2xl">
            <h4 class="text-xl font-black mb-6 text-navy italic border-b pb-2 uppercase text-center">Confirmar Endereço</h4>
            <form id="formFinalizar" class="grid grid-cols-2 gap-4 text-sm">
                <input type="text" id="cep" placeholder="CEP" class="border p-3 outline-none" required>
                <input type="text" id="cidade" value="Pirapora do Bom Jesus" class="border p-3 bg-slate-100 font-bold" readonly>
                <input type="text" id="rua" placeholder="Endereço" class="col-span-2 border p-3 outline-none" required>
                <input type="text" id="num" placeholder="Nº" class="border p-3" required>
                <input type="text" id="bairro" placeholder="Bairro" class="border p-3" required>
                <select id="pag" class="col-span-2 border p-3 bg-slate-50 font-bold text-navy outline-none"><option value="Pix">Pix</option><option value="Cartão">Cartão</option></select>
                <button type="submit" class="col-span-2 bg-accent text-navy py-4 font-black text-sm hover:bg-yellow-400 uppercase transition">Ir para Pagamento</button>
                <button type="button" onclick="document.getElementById('modal-checkout').classList.add('hidden')" class="col-span-2 text-slate-400 text-[10px] uppercase font-bold text-center mt-2 underline">Cancelar</button>
            </form>
        </div>
        <div id="container-pagamento" class="bg-white p-8 max-w-md w-full rounded-sm hidden text-center shadow-2xl">
            <h4 class="text-2xl font-black text-navy italic mb-2 uppercase">Pagamento Pix</h4>
            <p class="text-xs text-slate-500 mb-6 italic">Valor Total: <span class="font-black text-navy" id="valor-final-pix"></span></p>
            <div class="bg-white p-4 mb-6 flex justify-center border-2 border-slate-100 shadow-inner">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=SEBO-SABRINA-PIM" style="width: 180px; height: 180px;">
            </div>
            <button onclick="confirmarPedidoNoBanco()" class="w-full bg-emerald-600 text-white py-4 font-black hover:bg-emerald-700 transition uppercase shadow-lg">JÁ PAGUEI</button>
        </div>
        <div id="container-sucesso" class="bg-white p-10 max-w-md w-full rounded-sm hidden text-center">
            <div class="text-5xl mb-4">✅</div>
            <h4 class="text-2xl font-black text-navy italic mb-2">SUCESSO!</h4>
            <p class="text-slate-500 mb-8 italic">Seu pedido foi registrado.</p>
            <button onclick="irParaMinhasCompras()" class="w-full bg-navy text-white py-4 font-black uppercase tracking-widest">Ver Meus Pedidos</button>
        </div>
    </div>

    <div id="modal-auth" class="fixed inset-0 bg-navy/95 hidden flex items-center justify-center p-4 z-[2000]">
        <div class="bg-white p-8 max-w-sm w-full rounded-sm">
            <h4 id="auth-title" class="text-xl font-black mb-6 text-navy italic uppercase text-center border-b pb-2">Identificação</h4>
            <form id="formAuth" class="space-y-4">
                <input type="text" id="authNome" placeholder="Nome Completo" class="w-full border p-3 hidden outline-none">
                <input type="email" id="authEmail" placeholder="E-mail" class="w-full border p-3 outline-none" required>
                <input type="password" id="authSenha" placeholder="Senha" class="w-full border p-3 outline-none" required>
                <button type="submit" class="w-full bg-navy text-white py-3 font-black uppercase">Entrar</button>
                <button type="button" onclick="toggleModoAuth()" id="btn-toggle" class="text-[10px] text-blue-600 font-bold block w-full mt-2 text-center uppercase underline">Criar Conta</button>
            </form>
        </div>
    </div>

    <script>
        // O SEGREDO ESTÁ AQUI: Esta linha descobre o link do localtunnel sozinha!
        const API_URL = window.location.origin;

        let usuario = JSON.parse(localStorage.getItem('usuario'));
        let modoLogin = true;
        let carrinho = [];
        let dadosTemporariosPedido = null;

        function abrirLogin() { document.getElementById('modal-auth').classList.remove('hidden'); }
        function sair() { localStorage.clear(); window.location.reload(); }
        function voltarLoja() { location.reload(); }
        function abrirVenderObra() { if(!usuario) return abrirLogin(); document.getElementById('banner-hero').classList.add('hidden'); document.getElementById('loja-container').classList.add('hidden'); document.getElementById('area-pedidos').classList.add('hidden'); document.getElementById('area-venda').classList.remove('hidden'); }
        function verMeusPedidos() { if(!usuario) return abrirLogin(); document.getElementById('banner-hero').classList.add('hidden'); document.getElementById('loja-container').classList.add('hidden'); document.getElementById('area-pedidos').classList.remove('hidden'); document.getElementById('area-venda').classList.add('hidden'); carregarMeusPedidos(); }

        async function carregarVitrine() {
            try {
                const res = await fetch(`${API_URL}/livros`);
                const livros = await res.json();
                const oficiais = livros.filter(l => !l.titulo.toUpperCase().includes("PROPOSTA"));
                document.getElementById('vitrine').innerHTML = oficiais.map(l => `
                    <div class="bg-white p-4 border border-slate-100 hover:border-accent transition shadow-sm">
                        <div class="h-48 mb-4 bg-slate-50 flex items-center justify-center"><img src="${API_URL}/${l.imagem || 'capas/default.jpg'}" class="max-h-full"></div>
                        <h5 class="font-bold text-navy text-sm h-10 overflow-hidden uppercase">${l.titulo}</h5>
                        <div class="flex justify-between items-center mt-4">
                            <p class="text-navy font-black italic text-lg">R$ ${parseFloat(l.preco).toFixed(2)}</p>
                            <button onclick="addCart('${l.titulo}', ${l.preco})" class="bg-navy text-white px-3 py-2 font-black">🛒</button>
                        </div>
                    </div>`).join('');
                if(usuario) {
                    document.getElementById('user-status').classList.add('hidden');
                    document.getElementById('user-logged-nav').classList.remove('hidden');
                    document.getElementById('label-user').innerText = `Olá, ${usuario.nome.split(' ')[0]}`;
                }
            } catch(e) { console.error("Erro ao carregar vitrine", e); }
        }

        function addCart(t, p) {
            if(!usuario) return abrirLogin();
            carrinho.push({t, p});
            document.getElementById('count').innerText = `${carrinho.length} ITENS`;
            document.getElementById('total-val').innerText = `R$ ${carrinho.reduce((a, b) => a + b.p, 0).toFixed(2)}`;
            alert("Adicionado ao carrinho!");
        }

        function abrirModalCarrinho() {
            if(carrinho.length === 0) return alert("Adicione livros primeiro!");
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        document.getElementById('formFinalizar').addEventListener('submit', (e) => {
            e.preventDefault();
            const total = carrinho.reduce((a, b) => a + b.p, 0);
            dadosTemporariosPedido = {
                usuario_id: usuario.id, cliente_nome: usuario.nome, total: total, pagamento: document.getElementById('pag').value, itens: carrinho.map(c => c.t).join(', ')
            };
            document.getElementById('valor-final-pix').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('container-endereco').classList.add('hidden');
            document.getElementById('container-pagamento').classList.remove('hidden');
        });

        async function confirmarPedidoNoBanco() {
            await fetch(`${API_URL}/pedidos`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dadosTemporariosPedido) });
            document.getElementById('container-pagamento').classList.add('hidden');
            document.getElementById('container-sucesso').classList.remove('hidden');
        }

        function irParaMinhasCompras() { document.getElementById('modal-checkout').classList.add('hidden'); verMeusPedidos(); }

        document.getElementById('formAuth').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rota = modoLogin ? 'login' : 'cadastro';
            const body = modoLogin ? { email: authEmail.value, senha: authSenha.value } : { nome: authNome.value, email: authEmail.value, senha: authSenha.value };
            const res = await fetch(`${API_URL}/${rota}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            if(res.ok) {
                if(modoLogin) { usuario = await res.json(); localStorage.setItem('usuario', JSON.stringify(usuario)); window.location.reload(); }
                else { alert("Conta criada!"); toggleModoAuth(); }
            } else { alert("Erro na autenticação."); }
        });

        function toggleModoAuth() { modoLogin = !modoLogin; document.getElementById('auth-title').innerText = modoLogin ? "IDENTIFICAÇÃO" : "NOVA CONTA"; document.getElementById('authNome').classList.toggle('hidden', modoLogin); }

        document.getElementById('formProposta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p = { titulo: "(PROPOSTA CLIENTE) " + document.getElementById('propTitulo').value, estoque: 1, preco: parseFloat(propPreco.value), imagem: 'capas/default.jpg' };
            await fetch(`${API_URL}/livros`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("Proposta enviada!"); location.reload();
        });

        async function carregarMeusPedidos() {
            const res = await fetch(`${API_URL}/meus-pedidos/${usuario.id}`);
            const peds = await res.json();
            document.getElementById('lista-meus-pedidos').innerHTML = peds.map(p => `
                <div class="bg-white p-4 border flex justify-between items-center shadow-sm">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase italic">#${p.id}</p><h4 class="font-bold text-navy text-sm uppercase">${p.itens}</h4></div>
                    <div class="text-right"><p class="font-black text-navy italic">R$ ${parseFloat(p.total).toFixed(2)}</p></div>
                </div>`).join('');
        }

        carregarVitrine();
    </script>
</body>
</html>
